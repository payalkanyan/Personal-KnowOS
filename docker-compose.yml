services:
  postgres:
    image: postgres:15-alpine
    container_name: pk_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: personal_knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: pk_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15.0
    container_name: pk_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474" # Browser GUI
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
